<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UFABC Feed Console — Approval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./design-tokens.css?v=20260324" />
    <link rel="stylesheet" href="./styles.css?v=20260324" />
    <link rel="stylesheet" href="./approval.css?v=20260324" />
  </head>
  <body>
    <!-- Ambient background effects -->
    <div class="bg-grain"></div>
    <div class="bg-glow bg-glow--top"></div>
    <div class="bg-glow bg-glow--bottom"></div>

    <!-- ═══ APP SHELL ═══ -->
    <div class="app-shell">

      <!-- ── Left Sidebar ── -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar__brand">
          <span class="sidebar__logo">U</span>
        </div>
        <div class="sidebar__nav">
          <a href="./index.html" class="sidebar__btn" title="FileSystem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="sidebar__label">Files</span>
          </a>
          <a href="./approval.html" class="sidebar__btn active" title="Approval">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <span class="sidebar__label">Review</span>
          </a>
        </div>
        <div class="sidebar__footer">
          <div class="sidebar__status" id="live-indicator" title="SeaweedFS connection">
            <span class="pulse-dot"></span>
          </div>
        </div>
      </nav>

      <!-- ── Main Content ── -->
      <main class="main-area">
        <header class="topbar">
          <div class="topbar__left">
            <h1 class="topbar__title">Approval Queue</h1>
            <span class="topbar__badge">Review</span>
          </div>
          <div class="topbar__actions">
            <button id="theme-toggle-btn" class="btn btn--ghost btn--icon" type="button" title="Toggle light/dark mode">
              <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
            <div class="topbar__divider"></div>
            <button id="refresh-btn" class="btn btn--outline btn--sm" type="button" title="Refresh">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              <span>Refresh</span>
            </button>
          </div>
        </header>

        <!-- Filters & Table -->
        <div class="approval-content">
          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-bar__group">
              <label class="filter-bar__label">Status</label>
              <div class="filter-chips" id="status-filters">
                <button class="filter-chip active" data-status="all">All</button>
                <button class="filter-chip" data-status="pending">Pending</button>
                <button class="filter-chip" data-status="processing">Processing</button>
                <button class="filter-chip" data-status="indexed">Indexed</button>
                <button class="filter-chip" data-status="failed">Failed</button>
              </div>
            </div>
            <div class="filter-bar__group">
              <label class="filter-bar__label">Search</label>
              <input id="search-input" type="text" class="input input--mini" placeholder="Filter by filename or folder..." />
            </div>
            <div class="filter-bar__stats">
              <span id="stats-label" class="filter-bar__stat-text">0 files</span>
            </div>
          </div>

          <!-- Table -->
          <div class="approval-table-wrap">
            <table class="approval-table">
              <thead>
                <tr>
                  <th class="col-name">Filename</th>
                  <th class="col-folder">Folder</th>
                  <th class="col-status">Status</th>
                  <th class="col-size">Size</th>
                  <th class="col-date">Date</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="approval-tbody">
                <!-- Rows rendered by JS -->
              </tbody>
            </table>
            <div class="approval-empty" id="approval-empty" hidden>
              No files match your filters.
            </div>
          </div>

          <!-- Pagination -->
          <div class="pagination" id="pagination">
            <button id="page-prev" class="btn btn--ghost btn--xs" disabled>&larr; Prev</button>
            <span id="page-info" class="pagination__info">Page 1 of 1</span>
            <button id="page-next" class="btn btn--ghost btn--xs" disabled>Next &rarr;</button>
          </div>
        </div>
      </main>
    </div>

    <!-- ═══ PREVIEW MODAL ═══ -->
    <div class="modal-overlay" id="preview-modal" hidden>
      <div class="modal" role="dialog" aria-label="File Preview">
        <div class="modal__header">
          <div class="modal__title-area">
            <h2 class="modal__title" id="modal-title">File Preview</h2>
            <p class="modal__subtitle" id="preview-file"></p>
          </div>
          <button class="modal__close" id="close-preview-btn" type="button" title="Close preview">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div class="modal__section">
            <h3 class="modal__section-title">Metadata</h3>
            <pre id="preview-metadata" class="code-block">-</pre>
          </div>
          <div class="modal__section">
            <h3 class="modal__section-title">Content Preview</h3>
            <iframe id="preview-iframe" class="preview-frame" title="Document Preview"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="./approval.js?v=20260324" defer></script>
  </body>
</html>
