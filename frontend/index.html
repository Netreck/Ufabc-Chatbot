<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UFABC Feed Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./design-tokens.css?v=20260323b" />
    <link rel="stylesheet" href="./styles.css?v=20260323b" />
  </head>
  <body>
    <!-- Ambient background effects -->
    <div class="bg-grain"></div>
    <div class="bg-glow bg-glow--top"></div>
    <div class="bg-glow bg-glow--bottom"></div>

    <!-- ═══ APP SHELL ═══ -->
    <div class="app-shell">

      <!-- ── Left Sidebar (Main) ── -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar__brand">
          <span class="sidebar__logo">U</span>
        </div>
        <div class="sidebar__nav">
          <button class="sidebar__btn active" data-panel="filesystem" title="FileSystem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="sidebar__label">Files</span>
          </button>
          <a href="./approval.html" class="sidebar__btn" title="Approval Queue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <span class="sidebar__label">Review</span>
          </a>
        </div>
        <div class="sidebar__footer">
          <div class="sidebar__status" id="live-indicator" title="SeaweedFS connection">
            <span class="pulse-dot"></span>
          </div>
        </div>
      </nav>

      <!-- ── Center: FileSystem Panel ── -->
      <main class="main-area">
        <header class="topbar">
          <div class="topbar__left">
            <h1 class="topbar__title">UFABC Feed Console</h1>
            <span class="topbar__badge">SeaweedFS</span>
          </div>
          <div class="topbar__actions">
            <button id="theme-toggle-btn" class="btn btn--ghost btn--icon" type="button" title="Toggle light/dark mode">
              <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
            <div class="topbar__divider"></div>
            <button id="refresh-btn" class="btn btn--outline btn--sm" type="button" title="Refresh filesystem">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              <span>Refresh</span>
            </button>
          </div>
        </header>

        <div class="workspace">
          <!-- FileSystem Panel -->
          <section class="panel-fs" id="panel-filesystem">

            <!-- Upload / Paste Zone -->
            <div class="paste-zone" id="paste-zone">
              <form id="upload-form" class="paste-zone__form">
                <div class="paste-zone__drop" id="drop-zone">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                  </svg>
                  <span class="paste-zone__text">Drop .md files here or click to browse</span>
                  <input id="file-input" type="file" accept=".md,text/markdown" multiple />
                </div>
                <div class="paste-zone__meta">
                  <input id="storage-metadata-input" type="text" class="input" placeholder='Storage metadata JSON (optional)' />
                  <button type="submit" class="btn btn--primary btn--sm" id="upload-submit-btn">Upload</button>
                </div>
              </form>
              <p id="upload-result" class="toast-msg"></p>
              <p id="upload-target-folder" class="paste-zone__target">Target: /</p>
              <!-- Upload Queue -->
              <div class="upload-queue" id="upload-queue" hidden>
                <div class="upload-queue__header">
                  <span class="upload-queue__title">Upload Queue</span>
                  <span class="upload-queue__summary" id="upload-queue-summary"></span>
                  <button type="button" class="btn btn--ghost btn--xs" id="upload-queue-clear">Clear</button>
                </div>
                <div class="upload-queue__list" id="upload-queue-list"></div>
              </div>
            </div>

            <!-- Folder Tree + File List -->
            <div class="fs-grid">
              <!-- Folder sidebar -->
              <aside class="folder-panel" id="folder-panel">
                <div class="folder-panel__header">
                  <span class="folder-panel__title">Folders</span>
                  <form id="create-folder-form" class="folder-panel__create">
                    <input id="create-folder-input" type="text" class="input input--mini" placeholder="New folder..." required />
                    <button type="submit" class="btn btn--ghost btn--xs" title="Create folder">+</button>
                  </form>
                </div>
                <div id="folder-tree" class="folder-tree"></div>
              </aside>
              <div class="resize-handle resize-handle--folder" id="resize-folder" title="Drag to resize"></div>

              <!-- File list -->
              <div class="file-list-area">
                <div class="file-list-header">
                  <p id="current-folder-label" class="file-list-header__path">/</p>
                  <p id="chat-context-info" class="file-list-header__context"></p>
                </div>
                <div class="file-list" id="file-list">
                  <!-- File rows rendered by JS -->
                </div>
              </div>
            </div>
          </section>

          <div class="resize-handle resize-handle--chat" id="resize-chat" title="Drag to resize"></div>
          <!-- Chat Panel (visible on mobile or when selected) -->
          <aside class="panel-chat" id="panel-chat">
            <div class="panel-chat__header">
              <h2 class="panel-chat__title">Smoke Test Chat</h2>
              <button id="clear-chat-context-btn" class="btn btn--ghost btn--xs" type="button">Clear ctx</button>
            </div>

            <!-- Loaded files list -->
            <div class="loaded-files" id="loaded-files-list">
              <p class="loaded-files__empty">No files loaded for context.</p>
            </div>

            <!-- Chat messages -->
            <div class="chat-messages" id="chat-messages">
              <!-- Messages rendered by JS as chat bubbles -->
            </div>

            <!-- Chat input -->
            <form id="chat-form" class="chat-input-area">
              <input id="chat-input" type="text" class="input chat-input" placeholder="Ask something..." required />
              <button type="submit" class="btn btn--primary btn--icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </form>
          </aside>
        </div>
      </main>
    </div>

    <!-- ═══ PREVIEW MODAL ═══ -->
    <div class="modal-overlay" id="preview-modal" hidden>
      <div class="modal" role="dialog" aria-label="File Preview">
        <div class="modal__header">
          <div class="modal__title-area">
            <h2 class="modal__title" id="modal-title">File Preview</h2>
            <p class="modal__subtitle" id="preview-file"></p>
          </div>
          <div class="modal__header-actions">
            <button class="btn btn--ghost btn--xs" id="edit-preview-btn" type="button">Edit</button>
            <button class="btn btn--primary btn--xs" id="save-preview-btn" type="button" hidden>Save</button>
            <button class="btn btn--ghost btn--xs" id="cancel-edit-btn" type="button" hidden>Cancel</button>
            <button class="modal__close" id="close-preview-btn" type="button" title="Close preview">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="modal__body">
          <div class="modal__section">
            <h3 class="modal__section-title">Content Preview</h3>
            <iframe id="preview-iframe" class="preview-frame" title="Document Preview"></iframe>
            <textarea id="preview-editor" class="preview-editor" hidden spellcheck="false"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Context menu for folders -->
    <div class="ctx-menu" id="folder-ctx-menu" hidden>
      <button class="ctx-menu__item ctx-menu__item--danger" id="ctx-delete-folder">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Delete folder
      </button>
    </div>

    <script src="./app.js?v=20260323b" defer></script>
  </body>
</html>
