services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ufabc:ufabc@database:5432/ufabc_chatbot
      FEED_STORAGE_BACKEND: seaweed
      SEAWEED_S3_ENDPOINT: http://seaweed:8333
      SEAWEED_S3_ACCESS_KEY: seaweed_local_access
      SEAWEED_S3_SECRET_KEY: seaweed_local_secret
      SEAWEED_S3_REGION: us-east-1
      SEAWEED_S3_BUCKET: ufabc-feed
      SEAWEED_S3_SECURE: "false"
      SEAWEED_S3_CREATE_BUCKET_IF_MISSING: "true"
      MAX_FEED_FILE_SIZE_MB: 25
    depends_on:
      database:
        condition: service_healthy
      seaweed:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ufabc_chatbot
      POSTGRES_USER: ufabc
      POSTGRES_PASSWORD: ufabc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ufabc -d ufabc_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  seaweed:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data -ip=seaweed -s3.port=8333 -s3.config=/etc/seaweedfs/s3-config.json"
    volumes:
      - seaweed_data:/data
      - ./docker/seaweed/s3-config.json:/etc/seaweedfs/s3-config.json:ro
    ports:
      - "8333:8333"
      - "9333:9333"
      - "8888:8888"

volumes:
  postgres_data:
  seaweed_data:
