services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      FEED_STORAGE_BACKEND: seaweed
      SEAWEED_S3_ENDPOINT: http://seaweed:8333
      SEAWEED_S3_ACCESS_KEY: ${SEAWEED_S3_ACCESS_KEY}
      SEAWEED_S3_SECRET_KEY: ${SEAWEED_S3_SECRET_KEY}
      SEAWEED_S3_REGION: ${SEAWEED_S3_REGION:-us-east-1}
      SEAWEED_S3_BUCKET: ${SEAWEED_S3_BUCKET:-ufabc-feed}
      SEAWEED_S3_SECURE: "false"
      SEAWEED_S3_CREATE_BUCKET_IF_MISSING: "true"
      MAX_FEED_FILE_SIZE_MB: ${MAX_FEED_FILE_SIZE_MB:-25}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
      seaweed:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  seaweed:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data -ip=seaweed -s3.port=8333 -s3.config=/etc/seaweedfs/s3-config.json"
    volumes:
      - seaweed_data:/data
      - ./docker/seaweed/s3-config.json:/etc/seaweedfs/s3-config.json:ro
    ports:
      - "${SEAWEED_S3_PORT:-8333}:8333"
      - "9333:9333"
      - "8888:8888"

volumes:
  postgres_data:
  seaweed_data:
